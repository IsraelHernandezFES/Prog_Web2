<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDA REMASTERIZADA ROBCO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="crt-screen">
        <div class="scanlines"></div>
        
        <div class="terminal-window">
            <header>
                <h1>ROBCO INDUSTRIES TERMIANL</h1>
                <p class="subtitle">SISTEMA DE GESTIÓN DE SUMINISTROS | ISRAEL HERNANDEZ</p>
            </header>

            <section class="inventory-section">
                <h3>[ MANIFIESTO DE CARGA ]</h3>
                <ul id="carrito">
                    </ul>
            </section>

            <form id="formulario">
                <div class="input-group">
                    <label class="prompt">ARTÍCULO_</label>
                    <input type="text" id="nombre" placeholder="NOMBRE DEL OBJETO" required>
                </div>
                
                <div class="input-group">
                    <label class="prompt">CHIPS_</label>
                    <input type="number" id="precio" step="0.01" placeholder="PRECIO EN CHAPAS" required>
                </div>

                <div class="input-group">
                    <label class="prompt">CANT_</label>
                    <input type="number" id="cantidad" min="1" value="1" required>
                </div>

                <button type="submit">REGISTRAR EN INVENTARIO</button>
            </form>

            <div class="stats">
                CONEXIÓN ESTABLE | VENDEDOR ISRAEL HERNANDEZ | 2026-04-23 20:00:00
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
