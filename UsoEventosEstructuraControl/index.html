<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL DE SUMINISTROS V1.0.4</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="crt-screen">
        <div class="scanlines"></div>
        
        <div class="terminal-window">
            <header>
                <h1>SISTEMA DE INVENTARIO VAULT-TEC</h1>
                <p class="subtitle">ESTADO: CONECTADO // Vendedor Israel Hernandez</p>
            </header>

            <form id="formulario">
                <div class="input-group">
                    <span class="prompt">ID_OBJETO></span>
                    <input type="text" id="nombre" placeholder="NOMBRE_ITEM" required>
                </div>
                
                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 2;">
                        <span class="prompt">CAPS></span>
                        <input type="number" id="precio" step="0.01" placeholder="PRECIO" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <span class="prompt">CANT></span>
                        <input type="number" id="cantidad" value="1" required>
                    </div>
                </div>

                <button type="submit" id="btn-add">REGISTRAR EN MANIFIESTO</button>
            </form>

            <hr style="border: 1px solid var(--dim-green); margin: 20px 0;">

            <h2>LISTA DE CARGA</h2>
            <div id="carrito">
                CARRITO_VACIO
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
