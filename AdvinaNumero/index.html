<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Adivinanza - Israel Hernandez</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .contenedor { border: 2px solid #ccc; padding: 20px; display: inline-block; }
        #mensaje { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Adivina el número (1-10)</h1>
        <p>Israel Hernandez Pacheco</p>
        <p>Intentos restantes: <span id="intentos">3</span></p>
        
        <input type="number" id="numeroUsuario" min="1" max="10">
        <button onclick="verificarAdivinanza()">Probar</button>
        
        <div id="mensaje"></div>
        <br>
        <button onclick="location.reload()">Reiniciar Juego</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
